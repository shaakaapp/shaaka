name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter precache --ios

      - run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          cd Payload
          zip -r ../app.ipa .
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: app.ipa